name: CI

# Cross-platform is a non-negotiable (spec §1 #5, decision #37): every check
# runs on Linux, macOS, and Windows, and a regression on any one blocks merge.
on:
  push:
    branches: [main, release]
  pull_request:
  workflow_dispatch:

# One in-flight run per ref; a newer push cancels the older one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Run all three to completion even if one fails, so a platform-specific
      # break is never masked by an early exit on another.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # eframe/winit/rfd need X11 + Wayland + GTK headers to build on Linux.
      # The wgpu Vulkan/GLES backends load their drivers at runtime, so they
      # need no dev libraries here.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all targets, warnings as errors)
        run: cargo clippy --workspace --all-targets --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --workspace --locked
