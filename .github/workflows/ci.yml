name: CI

# Cross-platform is a non-negotiable (spec §1 #5, decision #37): every check
# runs on Linux, macOS, and Windows, and a regression on any one blocks merge.
on:
  push:
    branches: [main, release]
  pull_request:
  workflow_dispatch:

# One in-flight run per ref; a newer push cancels the older one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # The model is always embedded (build.rs bakes it in), so compiling dcs-io
    # needs the source files. Point build.rs at the cached copy instead of letting
    # it download on every run.
    env:
      DCS_MODEL_DIR: ${{ github.workspace }}/model
    strategy:
      # Run all three to completion even if one fails, so a platform-specific
      # break is never masked by an early exit on another.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # turbojpeg bundles libjpeg-turbo and builds its SIMD with CMake + NASM.
      # CMake ships on the runners; NASM does not, on any platform.
      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      # eframe/winit/rfd need X11 + Wayland + GTK headers to build on Linux.
      # The wgpu Vulkan/GLES backends load their drivers at runtime, so they
      # need no dev libraries here.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # build.rs embeds the model, so it needs the source files. Resolve the pin,
      # restore from cache, download once per revision, and hand the dir to build.rs.
      - name: Resolve pinned model revision
        id: model
        shell: bash
        run: |
          rev=$(tr -d '[:space:]' < crates/dcs-io/model_revision.txt)
          test -n "$rev" || { echo "could not read model_revision.txt"; exit 1; }
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Cache embedded model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model
          key: siglip-${{ steps.model.outputs.rev }}

      - name: Download embedded model (cache miss)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p model
          base="https://huggingface.co/google/siglip-base-patch16-384/resolve/${{ steps.model.outputs.rev }}"
          for f in config.json tokenizer.json model.safetensors; do
            curl -fSL --retry 3 "$base/$f" -o "model/$f"
          done

      - name: Format check
        run: cargo fmt --all --check

      # Clippy runs in check mode (no codegen/link), so it compiles and lints the
      # whole workspace — including dcs-ui and its wgpu/eframe stack — cheaply.
      # This is also the build-validation step: if it passes, everything compiles.
      - name: Clippy (all targets, warnings as errors)
        run: cargo clippy --workspace --all-targets --locked

      # Test everything except dcs-ui: it has no tests and is the only crate
      # pulling the heavy wgpu/eframe/winit graph, so excluding it keeps the
      # test build (full codegen) off the GPU stack entirely.
      - name: Test
        run: cargo test --workspace --exclude dcs-ui --locked
