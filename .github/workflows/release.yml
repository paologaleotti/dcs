name: Release

# Build distributable installers + portable archives on every push to `release`
# (downloadable as workflow artifacts) and publish a GitHub Release with the same
# assets on a version tag (`v*`). One matrix covers all three platforms (spec §1 #5).
#
# Packaging is done by cargo-packager: .dmg (macOS), NSIS installer (Windows),
# AppImage + .deb (Linux). It packages a prebuilt binary — it does not compile —
# so each job builds the release binary first, then packages target/release/dcs.
on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The embedding model is always baked into the binary (build.rs), so AI search
  # works offline with zero setup. It's fetched once per pinned revision and
  # cached; build.rs verifies its SHA-256 and fp16-converts it.
  MODEL_REPO: google/siglip-base-patch16-384

permissions:
  # Needed only for the tag path, to create/update the GitHub Release.
  contents: write

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            formats: deb appimage
          - os: macos-latest
            name: macos-arm64
            formats: dmg
          - os: windows-latest
            name: windows-x86_64
            formats: nsis
    steps:
      - uses: actions/checkout@v4

      # turbojpeg bundles libjpeg-turbo and builds its SIMD with CMake + NASM.
      # CMake ships on the runners; NASM does not, on any platform.
      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      # Dev headers eframe/winit/rfd link against to build on Linux. AppImage
      # tooling needs FUSE at runtime; rather than install libfuse2 (renamed on
      # 24.04), we run appimagetool with APPIMAGE_EXTRACT_AND_RUN=1 (set below).
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.name }}

      # The pinned model revision lives in crates/dcs-io/model_revision.txt — read it here so the cache
      # key and download URLs can never drift from what the build expects.
      - name: Resolve pinned model revision
        id: model
        shell: bash
        run: |
          rev=$(tr -d '[:space:]' < crates/dcs-io/model_revision.txt)
          test -n "$rev" || { echo "could not read model_revision.txt"; exit 1; }
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Cache embedded model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model
          key: siglip-${{ steps.model.outputs.rev }}

      - name: Download embedded model (cache miss)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p model
          base="https://huggingface.co/${MODEL_REPO}/resolve/${{ steps.model.outputs.rev }}"
          for f in config.json tokenizer.json model.safetensors; do
            curl -fSL --retry 3 "$base/$f" -o "model/$f"
          done

      # The release profile uses fat LTO + one codegen unit — slow to link, but
      # this is the shipped artifact, so it gets the full optimization. The model
      # is read from DCS_MODEL_DIR (no download in build.rs), verified, embedded.
      - name: Build release binary
        shell: bash
        env:
          DCS_MODEL_DIR: ${{ github.workspace }}/model
        run: cargo build --release --locked -p dcs-ui --bin dcs

      - name: Install cargo-packager
        shell: bash
        run: cargo install cargo-packager --locked

      # Package the prebuilt binary into the platform's installer(s). On macOS the
      # APPLE_* env vars drive code-signing (cert imported from APPLE_CERTIFICATE
      # into a temp keychain) and notarization; all are optional — when a secret is
      # unset the value is empty and cargo-packager produces an unsigned build that
      # Gatekeeper will warn on. Set the repo secrets to ship a signed, notarized app.
      - name: Package
        shell: bash
        env:
          # appimagetool is itself an AppImage; self-extract instead of mounting
          # via FUSE, which isn't available on the runner. No-op off Linux.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # --out-dir is resolved relative to the package manifest, not the cwd, so
        # pass an absolute path to land artifacts in the workspace-root dist/ that
        # the staging/archive/upload steps below read from.
        run: cargo packager --release --formats ${{ matrix.formats }} --out-dir "$GITHUB_WORKSPACE/dist"

      # The release binary bundles the SigLIP model (Apache-2.0), so its
      # attribution + license text must accompany the distribution.
      - name: Stage third-party notices
        shell: bash
        run: |
          cp THIRD_PARTY_NOTICES.md dist/
          curl -fSL --retry 3 https://www.apache.org/licenses/LICENSE-2.0.txt \
            -o dist/LICENSE-Apache-2.0.txt

      # Portable archive: the raw binary for users who don't want an installer.
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: tar -czf "dist/dcs-${{ matrix.name }}.tar.gz" -C target/release dcs

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/release/dcs.exe -DestinationPath "dist/dcs-${{ matrix.name }}.zip"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dcs-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
