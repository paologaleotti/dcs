name: Release

# Build distributable binaries on every push to `release` (downloadable as
# workflow artifacts) and publish a GitHub Release with the same assets on a
# version tag (`v*`). One matrix covers all three platforms (spec §1 #5).
on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The embedding model is always baked into the binary (build.rs), so AI search
  # works offline with zero setup. It's fetched once per pinned revision and
  # cached; build.rs verifies its SHA-256 and fp16-converts it.
  MODEL_REPO: google/siglip-base-patch16-384

permissions:
  # Needed only for the tag path, to create/update the GitHub Release.
  contents: write

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      # turbojpeg bundles libjpeg-turbo and builds its SIMD with CMake + NASM.
      # CMake ships on the runners; NASM does not, on any platform.
      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.name }}

      # The pinned model revision lives in crates/dcs-io/model_revision.txt — read it here so the cache
      # key and download URLs can never drift from what the build expects.
      - name: Resolve pinned model revision
        id: model
        shell: bash
        run: |
          rev=$(tr -d '[:space:]' < crates/dcs-io/model_revision.txt)
          test -n "$rev" || { echo "could not read model_revision.txt"; exit 1; }
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Cache embedded model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model
          key: siglip-${{ steps.model.outputs.rev }}

      - name: Download embedded model (cache miss)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p model
          base="https://huggingface.co/${MODEL_REPO}/resolve/${{ steps.model.outputs.rev }}"
          for f in config.json tokenizer.json model.safetensors; do
            curl -fSL --retry 3 "$base/$f" -o "model/$f"
          done

      # The release profile uses fat LTO + one codegen unit — slow to link,
      # but this is the shipped artifact, so it gets the full optimization. The
      # model is read from DCS_MODEL_DIR (no download in build.rs), verified, and
      # embedded.
      - name: Build release binary
        shell: bash
        env:
          DCS_MODEL_DIR: ${{ github.workspace }}/model
        run: cargo build --release --locked -p dcs-ui --bin dcs

      # The release binary bundles the SigLIP model (Apache-2.0), so its
      # attribution + license text must accompany the distribution.
      - name: Stage third-party notices
        shell: bash
        run: |
          mkdir -p dist
          cp THIRD_PARTY_NOTICES.md dist/
          curl -fSL --retry 3 https://www.apache.org/licenses/LICENSE-2.0.txt \
            -o dist/LICENSE-Apache-2.0.txt

      # --- Portable archive (every platform) ---

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf "dist/dcs-${{ matrix.name }}.tar.gz" -C target/release dcs

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/dcs.exe -DestinationPath "dist/dcs-${{ matrix.name }}.zip"

      # --- Installers (best-effort, per platform) ---

      # macOS: wrap the binary in a minimal .app and disk-image it with the
      # built-in hdiutil (no extra tooling). Unsigned — Gatekeeper will warn
      # until the app is code-signed/notarized (a future step with a cert).
      - name: Build .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="build/dcs.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/dcs "$APP/Contents/MacOS/dcs"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>dcs</string>
            <key>CFBundleDisplayName</key><string>dcs</string>
            <key>CFBundleIdentifier</key><string>io.quinck.dcs</string>
            <key>CFBundleExecutable</key><string>dcs</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME}</string>
            <key>CFBundleVersion</key><string>${GITHUB_REF_NAME}</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          hdiutil create -volname dcs -srcfolder build -ov -format UDZO "dist/dcs-${{ matrix.name }}.dmg"

      # Linux: a .deb via cargo-deb. Runtime library deps are resolved from the
      # linked shared objects (depends = "$auto" in dcs-ui/Cargo.toml).
      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-deb --locked
          cargo deb -p dcs-ui --no-build --output "dist/dcs-${{ matrix.name }}.deb"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dcs-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
